<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portifolio</title>
</head>
<body>
    <div class="card" id="card">
        <div class="frente">
            <div class="titlePortifolio">
                <h1>Portifólio</h1>
            </div>
            <div class="informacoes">
                <div class="fotoperfil">
                    <img src="/imag/ChatGPT Image 31 de mai. de 2026, 20_57_02.png" alt="foto de perfil">
                    <div class="status">🟢 disponível p/ contratação</div>
                </div>
                <div class="nomeCargo">
                    <div class="nome">
                        <h2>Samuel Meneses</h2>
                    </div>
                    <div class="cargo">
                        <p>Desenvolvedor Full Stack</p>
                    </div>
                </div>
            </div>
            <div class="botaoacao">
                <button id="btnPerfil">Ver Perfil</button>
            </div>
        </div>
        <div class="verso">
            <div class="projetos">
                <button id="btnProjetos">Projetos</button>
                <div class="conteudoProjeto">
                    <button>Portifolio 3D</button>
                    <button>Sistema de Vendas</button>
                    <button>Api de Tarefas</button>
                </div>
            </div>
            <div class="redesSociais">
                <button id="btnRedes">Redes Sociais</button>
                <div class="conteudoRedes">
                    <button>GitHub</button>
                    <button>LinkedIn</button>
                    <button>Currículo</button>
                    <button>Contato</button>
                </div>               
            </div>
            <div class="buttonlado2">
                <button type="button" id="btnVoltar">Voltar</button>
            </div>
        </div> 
    </div>
<script src="script.js"></script>
</body>
</html>
